<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Image studio</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg-0: oklch(0.16 0.005 60);
    --bg-1: oklch(0.19 0.006 60);
    --bg-2: oklch(0.22 0.007 60);
    --bg-3: oklch(0.27 0.008 60);
    --line: oklch(0.30 0.008 60);
    --line-soft: oklch(0.25 0.007 60);
    --fg-0: oklch(0.97 0.008 80);
    --fg-1: oklch(0.78 0.01 80);
    --fg-2: oklch(0.58 0.012 80);
    --fg-3: oklch(0.42 0.012 80);
    --accent: oklch(0.78 0.14 70);          /* warm amber */
    --accent-ink: oklch(0.18 0.04 70);
    --accent-soft: oklch(0.78 0.14 70 / 0.12);
    --good: oklch(0.78 0.13 150);
    --warn: oklch(0.78 0.14 50);
    --err:  oklch(0.70 0.18 25);

    /* project tint, set per active project */
    --tint-h: 70;
    --tint: oklch(0.78 0.13 var(--tint-h));
    --tint-soft: oklch(0.78 0.13 var(--tint-h) / 0.10);

    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;
    --r-xl: 20px;

    --col-rail: 248px;
    --col-inspector: 340px;

    --font-sans: 'Geist', system-ui, sans-serif;
    --font-mono: 'Geist Mono', ui-monospace, monospace;
    --font-serif: 'Instrument Serif', serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-0); color: var(--fg-0); font-family: var(--font-sans); font-size: 14px; line-height: 1.45; -webkit-font-smoothing: antialiased; }
  body { overflow: hidden; }
  button { font: inherit; color: inherit; }
  input, textarea { font: inherit; color: inherit; }
  ::selection { background: var(--accent-soft); color: var(--fg-0); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 8px; border: 2px solid var(--bg-0); }
  ::-webkit-scrollbar-thumb:hover { background: var(--line); }

  #root { height: 100vh; width: 100vw; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
